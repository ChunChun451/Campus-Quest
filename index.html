<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Campus Quest</h1>
        <div class="header-controls">
            <div class="notification-bell" id="notification-bell" style="display: none;">
                <div class="bell-icon" id="bell-icon">
                    🔔
                    <span class="notification-count" id="notification-count">0</span>
                </div>
                <div class="notification-dropdown" id="notification-dropdown">
                    <div class="dropdown-header">
                        <h4>Notifications</h4>
                        <button id="clear-notifications">Clear All</button>
                    </div>
                    <div class="notification-list" id="notification-list">
                        <!-- Notifications will be displayed here -->
                    </div>
                </div>
            </div>
            <div class="user-info" id="user-info" style="display: none;">
                <span id="welcome-message">Welcome, <span id="current-user"></span>!</span>
                <button id="signout-btn">Sign Out</button>
            </div>
        </div>
    </header>
    
    <!-- Sign-in Modal -->
    <div id="signin-modal" class="signin-modal">
        <div class="signin-content">
            <h2>Welcome to Campus Tasks</h2>
            <p id="modal-subtitle">Please sign in to access the task board</p>
            
            <!-- Toggle buttons -->
            <div class="auth-toggle">
                <button id="signin-toggle" class="toggle-btn active">Sign In</button>
                <button id="signup-toggle" class="toggle-btn">Sign Up</button>
            </div>
            
            <!-- Sign In Form -->
            <div id="signin-form" class="auth-form">
                <input type="text" id="username" placeholder="Enter your username" required>
                <input type="password" id="password" placeholder="Enter your password" required>
                <button id="signin-btn">Sign In</button>
                <div id="signin-error" class="auth-error" style="display: none;"></div>
            </div>
            
            <!-- Sign Up Form -->
            <div id="signup-form" class="auth-form hidden">
                <input type="text" id="new-username" placeholder="Choose a username" required>
                <input type="password" id="new-password" placeholder="Create a password" required>
                <input type="password" id="confirm-password" placeholder="Confirm password" required>
                <button id="signup-btn">Create Account</button>
                <div id="signup-error" class="auth-error" style="display: none;"></div>
            </div>
        </div>
    </div>
    
    <main id="main-content" style="display: none;">
        <section class="task-form">
            <form>
                <div class="form-group">
                    <label for="task-title">Task Title:</label>
                    <input type="text" id="task-title" name="task-title" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Description:</label>
                    <textarea id="description" name="description" rows="4" required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="reward">Reward:</label>
                    <input type="text" id="reward" name="reward" required>
                </div>
                
                <button type="submit">Post Task</button>
            </form>
        </section>
        
        <section class="task-list-container">
            <h2>Tasks</h2>
            <div class="task-list">
                <!-- Tasks will be displayed here -->
            </div>
        </section>
        
    </main>
    <!-- Firebase SDK -->
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your web app's Firebase configuration
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
            apiKey: "AIzaSyAILEPqpSE8c-Qr_7rSZvZkwRNCL-CwtAI",
            authDomain: "campus-quest-3e381.firebaseapp.com",
            projectId: "campus-quest-3e381",
            storageBucket: "campus-quest-3e381.firebasestorage.app",
            messagingSenderId: "498855301825",
            appId: "1:498855301825:web:11df6a5382cc53c4fe7a40",
            measurementId: "G-8ZK4N4SN4H"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);

        // Make Firebase available globally
        window.db = db;
    </script>
    <script src="script.js"></script>
</body>
</html>
